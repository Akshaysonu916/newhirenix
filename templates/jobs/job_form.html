{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full animate-fade-in-up">
 <div class="mb-10 flex border-b border-white/10 pb-6 items-center justify-between">
 <div>
 <h1 class="text-3xl font-bold text-white flex items-center gap-3">
 <div class="h-10 w-10 bg-brand-500/20 text-brand-400 rounded-lg flex items-center justify-center">
 <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
 </svg>
 </div>
 {{ title }}
 </h1>
 <p class="text-slate-400 mt-2 font-medium">Post a new opportunity to attract top talent.</p>
 </div>
 </div>

 <div class="glass-panel p-8 md:p-12 rounded-3xl border border-white/5 shadow-2xl relative z-10">
 <form method="post" class="space-y-8">
 {% csrf_token %}

 {% if form.errors %}
 <div class="bg-rose-500/10 border border-rose-500/50 text-rose-400 text-sm p-4 rounded-lg">
 <p class="font-bold mb-2">Please correct the errors below:</p>
 {{ form.errors }}
 </div>
 {% endif %}

 <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
 <!-- Job Title -->
 <div class="md:col-span-2">
 <label class="block text-sm font-medium text-slate-300 mb-2">Job Title *</label>
 <input type="text" name="title" value="{{ form.title.value|default:'' }}"
 class="bg-slate-800/50 border border-slate-700 text-white text-lg rounded-xl focus:ring-brand-500 focus:border-brand-500 block w-full p-4 transition-all"
 placeholder="e.g. Senior Backend Engineer" required>
 </div>

 <!-- Domain -->
 <div>
 <label class="block text-sm font-medium text-slate-300 mb-2">Domain / Technology *</label>
 <input type="text" name="domain" value="{{ form.domain.value|default:'' }}"
 class="bg-slate-800/50 border border-slate-700 text-white text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block w-full p-3 transition-all"
 placeholder="e.g. Python, AI, React" required>
 </div>

 <!-- Location -->
 <div>
 <label class="block text-sm font-medium text-slate-300 mb-2">Location *</label>
 <input type="text" name="location" value="{{ form.location.value|default:'' }}"
 class="bg-slate-800/50 border border-slate-700 text-white text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block w-full p-3 transition-all"
 placeholder="e.g. Remote / New York" required>
 </div>

 <!-- Salary -->
 <div>
 <label class="block text-sm font-medium text-slate-300 mb-2">Salary Range</label>
 <input type="text" name="salary_range" value="{{ form.salary_range.value|default:'' }}"
 class="bg-slate-800/50 border border-slate-700 text-white text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block w-full p-3 transition-all"
 placeholder="e.g. $120k - $150k">
 </div>
 </div>

 <!-- Description -->
 <div>
 <label class="block text-sm font-medium text-slate-300 mb-2">Job Description *</label>
 <textarea name="description" rows="5"
 class="bg-slate-800/50 border border-slate-700 text-white text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block w-full p-4 transition-all resize-none"
 placeholder="Provide a high-level overview of the role..."
 required>{{ form.description.value|default:'' }}</textarea>
 </div>

 <!-- Responsibilities -->
 <div>
 <label class="block text-sm font-medium text-slate-300 mb-2">Key Responsibilities</label>
 <textarea name="responsibilities" rows="4"
 class="bg-slate-800/50 border border-slate-700 text-white text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block w-full p-4 transition-all resize-none"
 placeholder="Bullet points or short paragraphs...">{{ form.responsibilities.value|default:'' }}</textarea>
 </div>

 <!-- Requirements -->
 <div>
 <label class="block text-sm font-medium text-slate-300 mb-2">Requirements</label>
 <textarea name="requirements" rows="4"
 class="bg-slate-800/50 border border-slate-700 text-white text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block w-full p-4 transition-all resize-none"
 placeholder="Skills, education, and experience needed...">{{ form.requirements.value|default:'' }}</textarea>
 </div>

 <div class="pt-6 flex flex-col sm:flex-row gap-4">
 <button type="submit"
 class="flex-1 btn-primary text-white font-bold rounded-xl text-lg px-6 py-4 text-center shadow-lg hover-scale">Post
 Job Listing</button>
 <a href="{% url 'dashboard' %}"
 class="px-6 py-4 bg-white/5 border border-white/10 text-white font-medium rounded-xl hover:bg-white/10 transition-colors text-center">Cancel</a>
 </div>
 </form>
 </div>
</div>
{% endblock %}
